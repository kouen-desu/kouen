<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KOUEN</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Noto Sans JP', sans-serif;
  text-align: center;
  color: #111;

  background:
    linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)),
    url("grass.jpg");

  background-size: cover;
  background-position: center;
}

.header {
  background: #fff;
  border-bottom: 1px solid #ddd;
  padding: 20px;
}

.logo {
  color: #e60023;
  font-weight: 900;
  font-size: 48px;
}

.container {
  background: #fff;
  width: 90%;
  max-width: 600px;
  margin: 40px auto;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  font-size: 22px;
  margin-bottom: 20px;
}

p {
  font-size: 14px;
  line-height: 1.6;
  color: #555;
}

.btn {
  display: block;
  margin: 15px auto;
  padding: 15px;
  width: 80%;
  max-width: 300px;
  font-size: 16px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
}

.enter {
  background: #d6336c;
  color: white;
}

.destroy {
  background: #333;
  color: white;
}

.btn:hover {
  opacity: 0.85;
}

#loading {
  display: none;
  margin-top: 20px;
  font-size: 16px;
}

.small {
  font-size: 12px;
  color: #999;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">
 <div class="logo">
  <img src="kouen-logo.png" alt="KOUEN">
</div>

<div class="container">

  <h2>日本を代表する非公式自然ポータルへようこそ</h2>

  <p>
    創業1000日以上の実績で、安心安全にご利用いただける無目的サイトです。
  </p>

  <p>
    ここから先は、無意味プロダクトを扱うサイトになります。<br>
    18歳未満の方のご入場はよくお考えください。
  </p>

  <h2>あなたはどんなおつもりですか？</h2>

  <button class="btn enter" onclick="enterSite()">入園したい</button>

  <a class="btn destroy" href="https://www.marugun.co.jp/産業用爆薬/">
    ぶち壊したい
  </a>

  <div id="loading">ロード中・・・🐦</div>

  <div class="small">
    ※どうか後悔のないように
  </div>

</div>

<audio id="bird" src="https://www.soundjay.com/nature/bird-1.mp3"></audio>

<script>
function enterSite() {
  document.getElementById("loading").style.display = "block";

  const bird = document.getElementById("bird");
  bird.play();

  setTimeout(() => {
    window.location.href = "loading.html";
  }, 2500);
}
</script>

</body>
</html>
