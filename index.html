<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KOUEN</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Noto Sans JP', sans-serif;
  text-align: center;
  color: #111;

  /* 🌱 薄い芝生ちゃんと表示 */
  background:
    linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
    url("grass.jpg");

  background-size: cover;
  background-position: center;
}

/* 上部バー（少し色） */
.header {
  background: #f5f5f5;
  border-bottom: 1px solid #ddd;
  padding: 20px;
}

/* ロゴ */
.logo img {
  width: 220px;
}

/* コンテンツ */
.container {
  background: #fff;
  width: 90%;
  max-width: 600px;
  margin: 40px auto;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  font-size: 22px;
  margin-bottom: 20px;
}

p {
  font-size: 14px;
  line-height: 1.6;
  color: #555;
}

/* ボタン */
.btn {
  display: block;
  margin: 15px auto;
  padding: 15px;
  width: 80%;
  max-width: 300px;
  font-size: 16px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
}

.enter {
  background: #d6336c;
  color: white;
}

.destroy {
  background: #333;
  color: white;
}

.small {
  font-size: 12px;
  color: #999;
  margin-top: 20px;
}
</style>
</head>

<body>

<audio id="bird" src="bird.mp3" preload="auto"></audio>
  
<div class="header">
  <div class="logo">
    <img src="kouen-logo.png">
  </div>
</div>

<div class="container">

  <h2>日本を代表する非公式自然ポータルへようこそ</h2>

  <p>
    創業1000日以上の実績で、安心安全にご利用いただける無目的サイトです。
  </p>

  <p>
    ここから先は、無意味プロダクトを扱うサイトになります。<br>
    18歳未満の方のご入場はお考えください。
  </p>

  <h2>あなたはどんなおつもりですか？</h2>

  <button class="btn enter" onclick="enterSite()">入園する</button>

  <a class="btn destroy" href="https://www.marugun.co.jp/産業用爆薬/">
    ぶち壊したい
  </a>

</div>

<script>
function enterSite() {
  const bird = document.getElementById("bird");

  bird.currentTime = 0;
  bird.play();

  // 少しだけ余韻作る
  setTimeout(() => {
    window.location.href = "loading.html";
  }, 800);
}
</script>
</body>
</html>
