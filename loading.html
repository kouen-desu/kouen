<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>入園中</title>

<style>
body {
  margin: 0;
  height: 100vh;
  text-align: center;
  font-family: sans-serif;
  color: #fff;

  /* 🌱 完全芝生（白なし） */
  background: url("grass.jpg") no-repeat center center;
  background-size: cover;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

h1 {
  font-size: 28px;
  text-shadow: 0 0 10px rgba(0,0,0,0.6);
}

p {
  font-size: 12px;
  margin-top: 20px;
  text-shadow: 0 0 8px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<h1>入園中・・・♡</h1>

<audio id="bird" preload="auto">
  <source src="bird.mp3">
</audio>

<script>
window.onload = function() {
  const bird = document.getElementById("bird");

  // 少し遅らせて再生（成功率UP）
  setTimeout(() => {
    bird.play().catch(() => {});
  }, 100);

  // 遷移
  setTimeout(() => {
    window.location.href = "https://kouen.square.site";
  }, 3000);
}
</script>

</body>
</html>
